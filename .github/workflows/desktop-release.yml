name: Desktop Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-desktop:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: ubuntu-latest
                    - platform: windows-latest
                    - platform: macos-latest

        runs-on: ${{ matrix.platform }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Sync app version from tag
              if: startsWith(github.ref, 'refs/tags/v')
              shell: bash
              run: |
                  APP_VERSION="${GITHUB_REF_NAME#v}"
                  echo "Syncing app version to ${APP_VERSION}"
                  APP_VERSION="${APP_VERSION}" node -e "const fs=require('fs');const version=process.env.APP_VERSION;if(!version||version==='undefined'){throw new Error('APP_VERSION is missing or invalid');}const pkgPath='package.json';const nlPath='neutralino.config.json';const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8'));pkg.version=version;fs.writeFileSync(pkgPath,JSON.stringify(pkg,null,4)+'\\n');const nl=JSON.parse(fs.readFileSync(nlPath,'utf8'));nl.version=version;fs.writeFileSync(nlPath,JSON.stringify(nl,null,4)+'\\n');"

            - name: Build Neutralino desktop app
              run: bun run build:desktop:release

            - name: Upload desktop artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: desktop-${{ matrix.platform }}
                  path: desktop-dist/**

    publish-release:
        needs: build-desktop
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: desktop-dist
                  pattern: desktop-*
                  merge-multiple: true

            - name: Publish GitHub release assets
              uses: softprops/action-gh-release@v2
              with:
                  name: Monochrome+ ${{ github.ref_name }}
                  body: Download the desktop package for your platform (NeutralinoJS runtime).
                  draft: false
                  prerelease: false
                  files: desktop-dist/**
