name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            target: ""
            arch: x86_64
            name: Linux
          - platform: windows-latest
            args: ""
            target: ""
            arch: x86_64
            name: Windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: universal-apple-darwin
            arch: universal
            name: macOS

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          REPO_SLUG="${GITHUB_REPOSITORY}"
          echo "Syncing app version to ${APP_VERSION}"
          APP_VERSION="${APP_VERSION}" REPO_SLUG="${REPO_SLUG}" node -e "
            const fs = require('fs');
            const version = process.env.APP_VERSION;
            const repoSlug = process.env.REPO_SLUG;
            if (!version || version === 'undefined') {
              throw new Error('APP_VERSION is missing or invalid');
            }
            if (!repoSlug || repoSlug === 'undefined') {
              throw new Error('REPO_SLUG is missing or invalid');
            }

            // Update package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = version;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');

            // Update tauri.conf.json
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tauri.version = version;
            const updaterEndpoint = 'https://github.com/' + repoSlug + '/releases/latest/download/latest.json';
            if (!tauri.plugins) tauri.plugins = {};
            if (!tauri.plugins.updater) tauri.plugins.updater = {};
            tauri.plugins.updater.endpoints = [updaterEndpoint];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 4) + '\n');

            // Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version\s*=\s*\"[^\"]+\"/m, 'version = \"' + version + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

            console.log('Version synced to', version);
          "

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Monochrome+ ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  finalize-release:
    needs: publish-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, generating notes from all history"
            RANGE=""
          else
            echo "Generating changelog from ${PREV_TAG} to ${TAG}"
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo "RELEASE_NOTES<<RELEASE_NOTES_EOF"
            echo "## Monochrome+ ${TAG}"
            echo ""
            echo "### What's Changed"
            echo ""

            # Features
            FEATURES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^feat" --no-merges 2>/dev/null || true)
            if [ -n "$FEATURES" ]; then
              echo "#### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi

            # Fixes
            FIXES=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^fix" --no-merges 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "#### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Performance
            PERF=$(git log $RANGE --pretty=format:"- %s (%h)" --grep="^perf" --no-merges 2>/dev/null || true)
            if [ -n "$PERF" ]; then
              echo "#### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi

            # Other changes (not feat/fix/perf/style/chore/ci/docs/build/refactor merge commits)
            OTHER=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^feat" --grep="^fix" --grep="^perf" --grep="^style" --grep="^chore" --grep="^ci" --grep="^docs" --grep="^build" --grep="^refactor" 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "#### 📦 Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "### Downloads"
            echo "- **Windows**: \`.exe\` installer (NSIS)"
            echo "- **macOS**: \`.dmg\` (Universal binary — Intel & Apple Silicon)"
            echo "- **Linux**: \`.AppImage\`, \`.deb\`, \`.rpm\`"
            echo ""
            echo "### Notes"
            echo "- Auto-updates are built-in. The app will check for updates on startup."
            echo ""
            echo "---"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            else
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${TAG}"
            fi
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Monochrome+ ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
