name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # --- HYPER-FAST RUST CONFIG (No Cache) ---
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # Speeds up compilation drastically at the cost of slight binary size increase
  CARGO_PROFILE_RELEASE_LTO: "thin"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45 # Lowered expected timeout since it's faster now

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            args: ""
          - platform: windows-latest
            name: windows
            args: ""
          - platform: macos-latest
            name: macos-aarch64
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            name: macos-x86_64
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ✅ HYPER-FAST LINUX DEPS + MOLD LINKER
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            dpkg-dev \
            fakeroot \
            rpm \
            librpm-dev \
            mold
          # Symlink mold as the default linker for a massive speed boost
          sudo ln -sf /usr/bin/mold /usr/bin/ld

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # ✅ VERSION SYNC
      - name: Sync version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"

          node -e "
          const fs = require('fs');
          const v = process.env.VERSION;

          if (fs.existsSync('package.json')) {
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          }

          if (fs.existsSync('src-tauri/tauri.conf.json')) {
            const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            t.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));
          }

          if (fs.existsSync('src-tauri/Cargo.toml')) {
            let c = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            c = c.replace(/^version = \".*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', c);
          }
          "
        env:
          VERSION: ${{ env.GITHUB_REF_NAME }}

      # ✅ FULL-FEATURED BUILD (UPDATER + SIGNING INJECTED)
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "bun run tauri"
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }} # Required to construct latest.json URLs
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "tauri-${{ matrix.name }}"

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Monochrome+ ${{ github.ref_name }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ BATCH UPLOAD (Faster than loops)
      - name: Upload Bundles, Sigs, and Updaters
        run: |
          shopt -s globstar nullglob
          # Include all executable types PLUS signatures (.sig) and updaters (.zip, .tar.gz)
          files=(artifacts/**/*.{AppImage,deb,rpm,dmg,exe,msi,zip,tar.gz,sig})
          
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            echo "No release assets found."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ MERGE & UPLOAD LATEST.JSON
      - name: Merge and Upload latest.json
        run: |
          shopt -s globstar nullglob
          JSON_FILES=(artifacts/**/latest.json)
          
          if [ ${#JSON_FILES[@]} -gt 0 ]; then
            # Deep merge all platform specific latest.json files into one unified file
            jq -s 'reduce .[] as $item ({}; . * $item)' "${JSON_FILES[@]}" > latest.json
            echo "Merged latest.json successfully:"
            cat latest.json
            gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
          else
            echo "No latest.json fragments found to merge."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}