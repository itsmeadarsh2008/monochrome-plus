name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  CARGO_PROFILE_RELEASE_LTO: "thin"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            args: ""
          - platform: windows-latest
            name: windows
            args: ""
          - platform: macos-latest
            name: macos-aarch64
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            name: macos-x86_64
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config dpkg-dev fakeroot \
            rpm librpm-dev mold
          sudo ln -sf /usr/bin/mold /usr/bin/ld

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # ✅ CROSS-PLATFORM VERSION SYNC (No more PowerShell errors)
      - name: Sync Version
        shell: node {0}
        run: |
          const fs = require('fs');
          const ref = process.env.GITHUB_REF;
          let version;

          if (ref.startsWith('refs/tags/v')) {
            version = ref.replace('refs/tags/v', '');
          } else {
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            version = pkg.version;
          }

          console.log(`Setting version to: ${version}`);

          // Update package.json and tauri.conf.json
          ['package.json', 'src-tauri/tauri.conf.json'].forEach(f => {
            if (fs.existsSync(f)) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = version;
              fs.writeFileSync(f, JSON.stringify(j, null, 2));
            }
          });

          // Update Cargo.toml
          if (fs.existsSync('src-tauri/Cargo.toml')) {
            let c = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            c = c.replace(/^version = \".*\"/m, `version = "${version}"`);
            fs.writeFileSync('src-tauri/Cargo.toml', c);
          }

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "bun run tauri"
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          includeUpdaterJson: true

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Release
        run: |
          gh release view "${GITHUB_REF_NAME}" || gh release create "${GITHUB_REF_NAME}" --title "Release ${GITHUB_REF_NAME}" --generate-notes
          
          # Collect all binaries (including deb/rpm) and updater signatures
          shopt -s globstar nullglob
          files=(artifacts/**/*.{deb,rpm,AppImage,dmg,exe,msi,zip,tar.gz,sig})
          
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          fi

          # Merge latest.json fragments if they exist
          JSON_FILES=(artifacts/**/latest.json)
          if [ ${#JSON_FILES[@]} -gt 0 ]; then
            jq -s 'reduce .[] as $item ({}; . * $item)' "${JSON_FILES[@]}" > latest.json
            gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}