name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # Hyper-fast compilation settings
  CARGO_PROFILE_RELEASE_LTO: "thin"
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: linux
            args: ""
          - platform: windows-latest
            name: windows
            args: ""
          - platform: macos-latest
            name: macos-aarch64
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            name: macos-x86_64
            args: "--target x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config dpkg-dev fakeroot \
            rpm librpm-dev mold
          sudo ln -sf /usr/bin/mold /usr/bin/ld

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Sync Version from Tag
        run: |
          # Get version from tag (v1.2.3 -> 1.2.3) or fallback to package.json version
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          node -e "
          const fs = require('fs');
          const v = process.env.VERSION;
          ['package.json', 'src-tauri/tauri.conf.json'].forEach(f => {
            if (fs.existsSync(f)) {
              const j = JSON.parse(fs.readFileSync(f));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2));
            }
          });
          if (fs.existsSync('src-tauri/Cargo.toml')) {
            let c = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            c = c.replace(/^version = \".*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', c);
          }
          "
        env:
          VERSION: ${{ env.VERSION }}

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "bun run tauri"
          args: ${{ matrix.args }}
          # Removed the invalid 'uploadWorkflowArtifacts' to fix warnings
          includeUpdaterJson: true
          tagName: ${{ github.ref_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Uses the built-in gh CLI to download and upload for maximum speed
      - name: Publish to GitHub Release
        run: |
          # Create the release first if it doesn't exist
          gh release view "${GITHUB_REF_NAME}" || gh release create "${GITHUB_REF_NAME}" --title "Release ${GITHUB_REF_NAME}" --generate-notes
          
          # Use a single batch upload for speed
          # Note: tauri-action v0.6.0 uploads assets automatically if tagName is provided,
          # but we manually ensure latest.json and all linux formats are covered.
          shopt -s globstar nullglob
          files=(src-tauri/target/release/bundle/**/*.{deb,rpm,AppImage,dmg,exe,msi,zip,tar.gz,sig,json})
          
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}