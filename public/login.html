<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome+ — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,600;6..96,700&family=Manrope:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-0: #09090f;
            --bg-1: #161624;
            --card: rgb(18 19 28 / 86%);
            --border: rgb(255 255 255 / 17%);
            --text: #f2f3f9;
            --muted: #a9adbf;
            --accent: #b9ff55;
            --accent-2: #6aa9ff;
            --danger-bg: rgb(123 30 30 / 25%);
            --danger-border: rgb(255 105 105 / 48%);
            --danger-text: #ffb0b0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at 12% 18%, rgb(185 255 85 / 30%), transparent 34%),
                radial-gradient(circle at 84% 18%, rgb(106 169 255 / 30%), transparent 40%),
                linear-gradient(145deg, var(--bg-0), var(--bg-1));
            background-color: var(--bg-0);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.2;
            background-image: radial-gradient(rgb(255 255 255 / 28%) 0.45px, transparent 0.45px);
            background-size: 3px 3px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 82%, transparent 100%);
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            padding: clamp(0.9rem, 1.8vw, 1.25rem);
            border: 1px solid rgb(255 255 255 / 16%);
            border-radius: 20px;
            background: var(--card);
            backdrop-filter: blur(16px) saturate(1.1);
            box-shadow:
                0 22px 70px rgb(0 0 0 / 55%),
                inset 0 0 0 1px rgb(255 255 255 / 8%),
                0 0 0 1px rgb(185 255 85 / 8%);
            position: relative;
            isolation: isolate;
        }

        .login-container::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            box-shadow: inset 0 1px 0 rgb(255 255 255 / 18%);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-mark {
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .logo-mark svg {
            width: 34px;
            height: 34px;
            flex: 0 0 auto;
        }

        .logo span {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: var(--text);
        }

        .auth-chip {
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.36rem 0.64rem;
            border-radius: 999px;
            border: 1px solid rgb(185 255 85 / 40%);
            color: var(--accent);
            background: rgb(185 255 85 / 10%);
        }

        .hero {
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: clamp(1.35rem, 5.4vw, 1.95rem);
            line-height: 1.15;
            margin-bottom: 0.4rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .hero p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .btn {
            width: 100%;
            min-height: 46px;
            padding: 0.82rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgb(255 255 255 / 4%);
            color: var(--text);
            font-size: 0.94rem;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition:
                background 0.2s,
                border-color 0.2s,
                transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            background: rgb(255 255 255 / 8%);
            border-color: rgb(255 255 255 / 26%);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            border-color: rgb(185 255 85 / 62%);
            color: #0f1408;
            background: linear-gradient(135deg, var(--accent), #d2ff8f);
        }

        .btn-primary:hover {
            border-color: rgb(185 255 85 / 80%);
            background: linear-gradient(135deg, #ccff80, #e2ffaf);
        }

        .btn-icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            flex: 0 0 auto;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgb(255 255 255 / 14%);
        }

        .stack {
            display: grid;
            gap: 0.75rem;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group input {
            width: 100%;
            padding: 0.83rem 0.95rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgb(255 255 255 / 3%);
            color: var(--text);
            font-size: 0.94rem;
            font-family: 'Manrope', sans-serif;
            outline: none;
            transition:
                border-color 0.18s,
                background 0.18s;
        }

        .form-group input::placeholder {
            color: rgb(169 173 191 / 80%);
        }

        .form-group input:focus {
            border-color: rgb(106 169 255 / 52%);
            background: rgb(255 255 255 / 5%);
        }

        .error-msg {
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: var(--danger-text);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.86rem;
            margin-bottom: 1rem;
            display: none;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .footer-note {
            margin-top: 1rem;
            color: var(--muted);
            font-size: 0.8rem;
            text-align: center;
        }

        @media (min-width: 640px) {
            .login-container {
                padding: 1.25rem;
                border-radius: 24px;
            }

            .logo span {
                font-size: 1.52rem;
            }

            .hero {
                margin-bottom: 1.25rem;
            }

            .hero h1 {
                font-size: clamp(1.6rem, 3vw, 2rem);
                margin-bottom: 0.5rem;
            }
        }

        @media (min-width: 1280px) {
            .login-container {
                max-width: 520px;
            }
        }

        @media (max-width: 520px) {
            .login-container {
                padding: 0.88rem;
                border-radius: 18px;
            }

            .hero h1 {
                font-size: 1.45rem;
            }

            .logo span {
                font-size: 1.3rem;
            }

            .logo {
                gap: 0.5rem;
            }

            .auth-chip {
                font-size: 0.66rem;
                padding: 0.28rem 0.5rem;
            }

            .btn,
            .form-group input {
                min-height: 44px;
            }

            .hero p,
            .footer-note {
                font-size: 0.82rem;
            }
        }

        @media (max-height: 760px) {
            body {
                align-items: flex-start;
            }

            .login-container {
                margin: auto;
            }
        }

        @media (max-height: 640px) {
            .logo {
                margin-bottom: 0.75rem;
            }

            .hero {
                margin-bottom: 0.75rem;
            }

            .hero h1 {
                font-size: 1.24rem;
                margin-bottom: 0.25rem;
            }

            .hero p {
                font-size: 0.8rem;
                line-height: 1.35;
            }

            .stack {
                gap: 0.6rem;
            }

            .divider {
                margin: 0.75rem 0;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-mark">
                <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="14.75 14.75 70.5 70.5">
                    <g fill="white">
                        <path
                            d="M38.25 14.75H85.25V61.75H61.75V38.25H38.25ZM14.75 38.25H38.25V61.75H61.75V85.25H14.75Z" />
                    </g>
                </svg>
                <span>Monochrome+</span>
            </div>
            <span class="auth-chip">Secure Auth</span>
        </div>

        <div class="hero">
            <h1>Authentication required</h1>
            <p>
                To prevent abuse to community APIs, Monochrome+ uses compulsory authentication before entering
                the music app.
            </p>
        </div>

        <div id="error" class="error-msg"></div>

        <div class="stack">
            <button id="google-btn" class="btn" onclick="googleSignIn()" style="display: none">
                <span class="btn-icon-wrap">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                </span>
                Sign in with Google
            </button>

            <div id="divider" class="divider" style="display: none">or use email</div>

            <form id="email-form" onsubmit="emailAuth(event)" style="display: none">
                <div class="stack">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Email" required autocomplete="email" />
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required
                            autocomplete="current-password" />
                    </div>
                    <button type="submit" id="email-btn" class="btn btn-primary">
                        <span id="email-btn-text">Enter Monochrome</span>
                        <span id="email-btn-spinner" class="spinner"></span>
                    </button>
                </div>
            </form>
        </div>

        <p class="footer-note">Protected route · Compulsory authentication enabled</p>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signInWithEmailAndPassword,
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const STORAGE_KEY = 'monochrome-firebase-config';
        const DEFAULT_CONFIG = {
            apiKey: 'AIzaSyDPU-unAjuLtQJt4IkGS5faG50UCF7lYyA',
            authDomain: 'monochrome-database.firebaseapp.com',
            projectId: 'monochrome-database',
            storageBucket: 'monochrome-database.firebasestorage.app',
            messagingSenderId: '895657412760',
            appId: '1:895657412760:web:e81c5044c7f4e9b799e8ed',
        };

        // Check for setup_firebase hash import
        const hash = window.location.hash;
        if (hash.startsWith('#setup_firebase=')) {
            try {
                const encoded = hash.split('#setup_firebase=')[1];
                const config = JSON.parse(atob(encoded));
                if (config.apiKey && config.authDomain) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                    window.history.replaceState(null, null, '/login');
                }
            } catch (e) {
                console.warn('Failed to import Firebase config from hash:', e);
            }
        }

        let storedConfig = null;
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) storedConfig = JSON.parse(raw);
        } catch (_) { }

        // Priority: server-injected env > localStorage > hash-imported > default
        const firebaseConfig = window.__FIREBASE_CONFIG__ || storedConfig || DEFAULT_CONFIG;
        // Sync to localStorage so the app's config.js picks up the same project
        if (window.__FIREBASE_CONFIG__ && !storedConfig) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(firebaseConfig));
        }
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const provider = new GoogleAuthProvider();

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        const googleBtn = document.getElementById('google-btn');
        const emailForm = document.getElementById('email-form');
        const divider = document.getElementById('divider');
        const providerState = {
            google: true,
            password: true,
        };
        const providerConfig = window.__AUTH_PROVIDERS__ || {};
        if (typeof providerConfig.google === 'boolean') providerState.google = providerConfig.google;
        if (typeof providerConfig.password === 'boolean') providerState.password = providerConfig.password;

        const NO_PROVIDER_MESSAGE = 'No sign-in providers are enabled for this Firebase project.';

        function renderProviders() {
            if (googleBtn) googleBtn.style.display = providerState.google ? '' : 'none';
            if (emailForm) emailForm.style.display = providerState.password ? '' : 'none';
            if (divider) divider.style.display = providerState.google && providerState.password ? '' : 'none';
            if (!providerState.google && !providerState.password) {
                showError(NO_PROVIDER_MESSAGE);
            }
        }

        renderProviders();

        function setLoading(loading) {
            document.getElementById('google-btn').disabled = loading;
            document.getElementById('email-btn').disabled = loading;
            document.getElementById('email-btn-text').style.display = loading ? 'none' : 'inline';
            document.getElementById('email-btn-spinner').style.display = loading ? 'inline-block' : 'none';
        }

        async function sendTokenToServer(user) {
            const token = await user.getIdToken();
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(data.error || 'Server authentication failed');
            }
            window.location.href = '/';
        }

        window.googleSignIn = async () => {
            hideError();
            setLoading(true);
            try {
                const result = await signInWithPopup(auth, provider);
                await sendTokenToServer(result.user);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user') {
                    showError(err.message);
                }
                setLoading(false);
            }
        };

        window.emailAuth = async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                await sendTokenToServer(result.user);
            } catch (err) {
                showError(err.message);
                setLoading(false);
            }
        };
    </script>
</body>

</html>
