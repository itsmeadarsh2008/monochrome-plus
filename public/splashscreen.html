<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Monochrome+</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: transparent;
                font-family:
                    'Inter',
                    -apple-system,
                    BlinkMacSystemFont,
                    'Segoe UI',
                    sans-serif;
            }

            .splash {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #09090b;
                border-radius: 16px;
                position: relative;
                overflow: hidden;
            }

            /* Ambient glow behind logo */
            .splash::before {
                content: '';
                position: absolute;
                width: 200px;
                height: 200px;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -60%);
                background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
                filter: blur(40px);
                animation: breathe 3s ease-in-out infinite;
            }

            /* Subtle grain texture */
            .splash::after {
                content: '';
                position: absolute;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
                border-radius: 16px;
                pointer-events: none;
            }

            @keyframes breathe {
                0%,
                100% {
                    opacity: 0.5;
                    transform: translate(-50%, -60%) scale(1);
                }
                50% {
                    opacity: 1;
                    transform: translate(-50%, -60%) scale(1.15);
                }
            }

            .logo-wrap {
                position: relative;
                z-index: 1;
                width: 64px;
                height: 64px;
                margin-bottom: 20px;
                animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            .logo-wrap svg {
                width: 100%;
                height: 100%;
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .wordmark {
                position: relative;
                z-index: 1;
                color: #fafafa;
                font-size: 18px;
                font-weight: 600;
                letter-spacing: 3px;
                text-transform: uppercase;
                margin-bottom: 36px;
                animation: fadeUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            .wordmark span {
                font-weight: 300;
                opacity: 0.5;
            }

            /* Minimal dot loader */
            .dots {
                position: relative;
                z-index: 1;
                display: flex;
                gap: 6px;
                animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            .dots i {
                width: 4px;
                height: 4px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.35);
                animation: dot 1.4s ease-in-out infinite;
            }

            .dots i:nth-child(2) {
                animation-delay: 0.15s;
            }
            .dots i:nth-child(3) {
                animation-delay: 0.3s;
            }

            @keyframes dot {
                0%,
                80%,
                100% {
                    opacity: 0.25;
                    transform: scale(1);
                }
                40% {
                    opacity: 1;
                    transform: scale(1.4);
                }
            }
        </style>
    </head>
    <body>
        <div class="splash">
            <div class="logo-wrap">
                <svg viewBox="14.75 14.75 70.5 70.5" xmlns="http://www.w3.org/2000/svg">
                    <path
                        fill="white"
                        d="M38.25 14.75H85.25V61.75H61.75V38.25H38.25ZM14.75 38.25H38.25V61.75H61.75V85.25H14.75Z"
                    />
                </svg>
            </div>
            <div class="wordmark">Monochrome<span>+</span></div>
            <div class="dots"><i></i><i></i><i></i></div>
        </div>
    </body>
</html>
